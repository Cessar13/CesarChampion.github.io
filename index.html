<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>César Paul André Champion Medrano</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #2563eb, #06b6d4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            max-width: 800px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        .subtitulo {
            font-size: 1.6rem;
            color: #fde047;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .descripcion {
            font-size: 1.3rem;
            line-height: 1.8;
        }

        a {
            color: #facc15;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>César Paul André Champion Medrano</h1>

        <div class="subtitulo">
            Mi Página Personal
        </div>

        <div class="descripcion">
            Actualmente estudio la carrera de <strong>Ciencias de la Computación</strong>
            en la
            <a href="https://ucsp.edu.pe" target="_blank">
                Universidad Católica San Pablo
            </a>.
        </div>
    </div>

</body>
</html>
